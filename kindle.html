<script>
// ===== иѓКжЦ≠ж®°еЉПпЉЪURL еК† #debug еЉАеРѓпЉМжѓПдЄАж≠•йГљжШЊз§ЇеЬ®й°µйЭҐдЄК =====
// ж≥®жДПпЉЪdiag еП™еЬ®"еК†иљљдЄ≠"зКґжАБй°µпЉИstatus-msgпЉЙжЧґжЙНжЫіжЦ∞жШЊз§ЇпЉМ
// йБњеЕНеЬ®еѓЖз†Бй°µ/е§©ж∞Фй°µжЄ≤жЯУеРОйЗНеЖЩ #app еѓЉиЗі UI еЕГзі†иҐЂйФАжѓБгАВ
var DEBUG = ((location.search || '').indexOf('debug=1') >= 0) ||
            ((location.hash || '').indexOf('debug') >= 0);
var _diagSteps = [];
function diag(step, info) {
  _diagSteps.push(step + (info ? ': ' + info : ''));
  if (DEBUG) {
    var app = document.getElementById('app');
    // еП™еЬ®ељУеЙНжШѓиѓКжЦ≠зКґжАБй°µжЧґжЙНжЫіжЦ∞жШЊз§ЇпЉМйБњеЕНз†іеЭПеѓЖз†Бй°µ/е§©ж∞Фй°µ
    if (app && app.getAttribute('data-diag') === '1') {
      app.innerHTML = '<div class="status-msg" style="text-align:left;font-size:18px;padding:20px;">' +
        'иѓКжЦ≠ж®°еЉП<br>' + _diagSteps.join('<br>') + '</div>';
    }
  }
}
// йААеЗЇиѓКжЦ≠жШЊз§Їж®°еЉПпЉИжЄ≤жЯУзЬЯеЃЮ UI еЙНи∞ГзФ®пЉЙ
function exitDiagDisplay() {
  var app = document.getElementById('app');
  if (app) app.removeAttribute('data-diag');
}
// еИЭеІЛеМЦиѓКжЦ≠зКґжАБй°µ
if (DEBUG) {
  var _app0 = document.getElementById('app');
  if (_app0) _app0.setAttribute('data-diag', '1');
}
diag('иДЪжЬђеЉАеІЛ');

// ===== еЕ®е±АйФЩиѓѓе§ДзРЖпЉИйБњеЕН Kindle жµПиІИеЩ®йЭЩйїШе§±иі•еН°еЬ®"еК†иљљдЄ≠"пЉЙ =====
window.onerror = function(msg, url, line, col, err) {
  var app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div class="status-msg">иДЪжЬђйФЩиѓѓ<br><small>' + msg + '<br>и°М: ' + line + '<br>URL: ' + url + '</small></div>';
  }
  return false;
};

// ===== Polyfill: padStartпЉИES2017пЉМKindle жµПиІИеЩ®дЄНжФѓжМБпЉЙ =====
if (!String.prototype.padStart) {
  String.prototype.padStart = function(targetLength, padString) {
    targetLength = targetLength >> 0;
    padString = String(padString || ' ');
    var s = String(this);
    if (s.length >= targetLength) return s;
    var pad = '';
    while (pad.length + s.length < targetLength) { pad += padString; }
    return pad.slice(0, targetLength - s.length) + s;
  };
}

// ===== Polyfill: Date.nowпЉИжЮБиАБжµПиІИеЩ®еПѓиГљж≤°жЬЙпЉЙ =====
if (!Date.now) {
  Date.now = function() { return new Date().getTime(); };
}

// ===== Polyfill: Array.prototype.indexOf =====
if (!Array.prototype.indexOf) {
  Array.prototype.indexOf = function(item) {
    for (var i = 0; i < this.length; i++) { if (this[i] === item) return i; }
    return -1;
  };
}

// ===== Polyfill: Array.prototype.map =====
if (!Array.prototype.map) {
  Array.prototype.map = function(fn) {
    var r = [];
    for (var i = 0; i < this.length; i++) r.push(fn(this[i], i));
    return r;
  };
}

// ===== Polyfill: Array.prototype.forEach =====
if (!Array.prototype.forEach) {
  Array.prototype.forEach = function(fn) {
    for (var i = 0; i < this.length; i++) fn(this[i], i);
  };
}

// ===== еЃЙеЕ®зЪДдЇЛдїґзїСеЃЪпЉИеЕЉеЃє IE иАБеЖЕж†Є attachEventпЉЙ =====
function bindEvent(el, type, handler) {
  if (el.addEventListener) {
    el.addEventListener(type, handler, false);
  } else if (el.attachEvent) {
    el.attachEvent('on' + type, handler);
  } else {
    el['on' + type] = handler;
  }
}

// ===== еЃЙеЕ®зЪДе≠ШеВ®иЃњйЧЃпЉИKindle йЪРзІБж®°еЉПеПѓиГљз¶БзФ®пЉЙ =====
function safeStorageGet(type, key) {
  try {
    var s = type === 'session' ? sessionStorage : localStorage;
    if (!s) return null;
    return s.getItem(key);
  } catch (e) { return null; }
}
function safeStorageSet(type, key, val) {
  try {
    var s = type === 'session' ? sessionStorage : localStorage;
    if (!s) return false;
    s.setItem(key, val);
    return true;
  } catch (e) { return false; }
}

// ===== еѓЖз†БдњЭжК§ =====
// еѓЖз†БеУИеЄМпЉИдњЃжФє PASSWORD_HASH жЭ•иЃЊзљЃдљ†зЪДеѓЖз†БпЉЙ
// йїШиЃ§еѓЖз†БпЉЪkindle2024
var PASSWORD_HASH = 'c7fffd6770b6f11abc3462d39c5289853859b052055a084df9163290683439ec';

// жЙЛеК® UTF-8 зЉЦз†БпЉИдЄНдЊЭиµЦ TextEncoderпЉМKindle жµПиІИеЩ®еПѓиГљдЄНжФѓжМБпЉЙ
function utf8Encode(str) {
  var bytes = [];
  for (var i = 0; i < str.length; i++) {
    var c = str.charCodeAt(i);
    if (c < 0x80) {
      bytes.push(c);
    } else if (c < 0x800) {
      bytes.push(0xC0 | (c >> 6));
      bytes.push(0x80 | (c & 0x3F));
    } else if (c < 0xD800 || c >= 0xE000) {
      bytes.push(0xE0 | (c >> 12));
      bytes.push(0x80 | ((c >> 6) & 0x3F));
      bytes.push(0x80 | (c & 0x3F));
    } else {
      i++;
      var c2 = str.charCodeAt(i);
      c = 0x10000 + (((c & 0x3FF) << 10) | (c2 & 0x3FF));
      bytes.push(0xF0 | (c >> 18));
      bytes.push(0x80 | ((c >> 12) & 0x3F));
      bytes.push(0x80 | ((c >> 6) & 0x3F));
      bytes.push(0x80 | (c & 0x3F));
    }
  }
  return bytes;
}

// зЇѓ JS SHA-256пЉИеРМж≠•пЉМES5 еЕЉеЃєпЉЙ
function sha256Sync(message) {
  function rrot(x, n) { return (x >>> n) | (x << (32 - n)); }
  var K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];
  var H = [
    0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19
  ];
  var msg = utf8Encode(message);
  var l = msg.length;
  var bitLen = l * 8;
  var k = Math.ceil((l + 9) / 64) * 64;
  var data = new Uint8Array(k);
  for (var i = 0; i < l; i++) data[i] = msg[i];
  data[l] = 0x80;
  var dv = new DataView(data.buffer);
  dv.setUint32(k - 4, bitLen >>> 0, false);
  dv.setUint32(k - 8, Math.floor(bitLen / 0x100000000), false);

  var w = new Uint32Array(64);
  for (var i = 0; i < k; i += 64) {
    for (var j = 0; j < 16; j++) w[j] = dv.getUint32(i + j * 4, false);
    for (var j = 16; j < 64; j++) {
      var s0 = rrot(w[j-15],7) ^ rrot(w[j-15],18) ^ (w[j-15] >>> 3);
      var s1 = rrot(w[j-2],17) ^ rrot(w[j-2],19) ^ (w[j-2] >>> 10);
      w[j] = (w[j-16] + s0 + w[j-7] + s1) >>> 0;
    }
    var a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];
    for (var j = 0; j < 64; j++) {
      var S1 = rrot(e,6) ^ rrot(e,11) ^ rrot(e,25);
      var ch = (e & f) ^ (~e & g);
      var t1 = (h + S1 + ch + K[j] + w[j]) >>> 0;
      var S0 = rrot(a,2) ^ rrot(a,13) ^ rrot(a,22);
      var maj = (a & b) ^ (a & c) ^ (b & c);
      var t2 = (S0 + maj) >>> 0;
      h = g; g = f; f = e; e = (d + t1) >>> 0;
      d = c; c = b; b = a; a = (t1 + t2) >>> 0;
    }
    H[0]=(H[0]+a)>>>0; H[1]=(H[1]+b)>>>0; H[2]=(H[2]+c)>>>0; H[3]=(H[3]+d)>>>0;
    H[4]=(H[4]+e)>>>0; H[5]=(H[5]+f)>>>0; H[6]=(H[6]+g)>>>0; H[7]=(H[7]+h)>>>0;
  }
  var hex = '';
  for (var i = 0; i < 8; i++) hex += H[i].toString(16).padStart(8, '0');
  return hex;
}

function showAuthScreen() {
  diag('жШЊз§ЇеѓЖз†Бй°µ');
  exitDiagDisplay();
  document.getElementById('app').innerHTML =
    '<div class="auth-screen">' +
      '<div class="auth-locked">рЯФТ</div>' +
      '<div class="auth-title">Kindle е§©ж∞ФеП∞еОЖ</div>' +
      '<div class="auth-hint">иѓЈиЊУеЕ•иЃњйЧЃеѓЖз†Б</div>' +
      '<input type="password" id="pwdInput" class="auth-input" autocomplete="off">' +
      '<button class="auth-btn" id="pwdBtn">ињЫеЕ•</button>' +
      '<div class="auth-error" id="authError"></div>' +
    '</div>';
  var input = document.getElementById('pwdInput');
  var btn = document.getElementById('pwdBtn');
  if (btn) bindEvent(btn, 'click', checkPassword);
  if (input) {
    try { input.focus(); } catch (e) {}
    bindEvent(input, 'keydown', function(e) {
      var ev = e || window.event;
      var key = ev.key || ev.keyCode;
      if (key === 'Enter' || key === 13) checkPassword();
    });
  }
}

// й™МиѓБеѓЖз†Б
function checkPassword() {
  diag('й™МиѓБеѓЖз†Б');
  var input = document.getElementById('pwdInput');
  var err = document.getElementById('authError');
  if (!input) return;
  var pwd = input.value;
  var hash;
  try {
    hash = sha256Sync(pwd);
  } catch (e) {
    diag('SHA256 е§±иі•', e.message);
    // SHA-256 дЄНеПѓзФ®жЧґпЉМзЫіжО•жФЊи°МпЉИKindle иАБжµПиІИеЩ®еЕЬеЇХпЉЙ
    hash = PASSWORD_HASH;
  }
  if (hash === PASSWORD_HASH) {
    safeStorageSet('session', 'kindle_auth', 'ok');
    loadWeather();
  } else {
    if (err) err.textContent = 'еѓЖз†БйФЩиѓѓпЉМиѓЈйЗНиѓХ';
    input.value = '';
    try { input.focus(); } catch (e) {}
  }
}
window.checkPassword = checkPassword;

// ===== еК†иљље§©ж∞ФжХ∞жНЃпЉИдљњзФ® XMLHttpRequestпЉМKindle жµПиІИеЩ®дЄНжФѓжМБ fetchпЉЙ =====
// дЉШеЕИзФ®еРМж≠• XHRпЉИKindle иАБжµПиІИеЩ®еЉВж≠•еЫЮи∞ГеПѓиГљдЄНиІ¶еПСпЉЙпЉМе§±иі•еЖНеЫЮйААеЉВж≠•
function loadJson(url, onSuccess, onError) {
  diag('иѓЈж±В', url);
  var done = false;
  var data = null;
  var err = null;

  // еЕИе∞ЭиѓХеРМж≠•иѓЈж±ВпЉИйШїе°ЮдљЖеПѓйЭ†пЉМKindle иАБжµПиІИеЩ®еЉВж≠•еЫЮи∞ГеЄЄеЗЇйЧЃйҐШпЉЙ
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, false);  // false = еРМж≠•
    xhr.send(null);
    if (xhr.status >= 200 && xhr.status < 300 || xhr.status === 0) {
      data = JSON.parse(xhr.responseText);
      done = true;
      diag('еРМж≠•иѓЈж±ВжИРеКЯ');
      onSuccess(data);
      return;
    } else {
      err = new Error('HTTP ' + xhr.status);
    }
  } catch (e) {
    err = e;
    diag('еРМж≠•иѓЈж±Ве§±иі•', e.message);
  }

  // еРМж≠•е§±иі•еИЩе∞ЭиѓХеЉВж≠•
  if (!done) {
    try {
      var xhr2 = new XMLHttpRequest();
      xhr2.open('GET', url, true);
      xhr2.onreadystatechange = function() {
        if (xhr2.readyState !== 4) return;
        if (xhr2.status >= 200 && xhr2.status < 300 || xhr2.status === 0) {
          try {
            var d = JSON.parse(xhr2.responseText);
            diag('еЉВж≠•иѓЈж±ВжИРеКЯ');
            onSuccess(d);
          } catch (e2) { onError(e2); }
        } else {
          onError(new Error('HTTP ' + xhr2.status));
        }
      };
      xhr2.onerror = function() { onError(new Error('зљСзїЬйФЩиѓѓ')); };
      xhr2.send(null);
    } catch (e3) {
      onError(err || e3);
    }
  }
}

function loadWeather() {
  diag('еЉАеІЛеК†иљље§©ж∞Ф');
  var city = getCurrentCity();
  diag('ељУеЙНеЯОеЄВ', city);
  var cityInfo = null;
  for (var i = 0; i < window.CITY_LIST.length; i++) {
    if (window.CITY_LIST[i].name === city) { cityInfo = window.CITY_LIST[i]; break; }
  }
  var file = cityInfo ? cityInfo.file : 'weather.json';
  diag('жХ∞жНЃжЦЗдїґ', file);
  loadJson(file + '?_t=' + Date.now(), function(data) {
    diag('еЉАеІЛжЄ≤жЯУ');
    try {
      render(data);
      diag('жЄ≤жЯУеЃМжИР');
    } catch (e) {
      diag('жЄ≤жЯУе§±иі•', e.message);
      showError(e);
    }
  }, function(err) {
    diag('дЄїжЦЗдїґе§±иі•', err.message);
    // еЯОеЄВдЄУе±ЮжЦЗдїґдЄНе≠ШеЬ®жЧґеЫЮйААеИ∞йїШиЃ§ weather.json
    if (file !== 'weather.json') {
      loadJson('weather.json?_t=' + Date.now(), function(data) {
        try { render(data); } catch (e) { showError(e); }
      }, function(e) { showError(e); });
    } else {
      showError(err);
    }
  });
}

function showError(err) {
  var msg = err && err.message ? err.message : String(err);
  document.getElementById('app').innerHTML =
    '<div class="status-msg">еК†иљље§©ж∞Фе§±иі•<br><small>' + msg +
    '</small><br><br>иѓЈз°ЃдњЭ weather.json е≠ШеЬ®</div>';
}
